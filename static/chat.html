<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat · AI Builder 代理</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <!-- 必須用 dist/，根目錄 purify.min.js 不存在 → 會載入失敗 -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e8eaed;
      --muted: #8b9cb3;
      --accent: #3d9eff;
      --user-bubble: #1e3a5f;
      --assistant-bubble: #252d3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Sora", "Noto Sans TC", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
      background: var(--surface);
    }
    header h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header label { font-size: 0.8rem; color: var(--muted); }
    header select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem 6rem;
      max-width: 52rem;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg .role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .msg .bubble {
      padding: 0.85rem 1rem;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.95rem;
      max-width: 100%;
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(61, 158, 255, 0.25);
      align-self: flex-end;
    }
    .msg.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
    }
    .msg.error .bubble {
      border-color: #c45c5c;
      background: #2a1a1a;
    }
    .msg.assistant .bubble :is(p, ul, ol, pre) { margin: 0.5em 0; }
    .msg.assistant .bubble pre {
      background: #0d1117;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
    }
    .msg.assistant .bubble code {
      font-family: ui-monospace, monospace;
      font-size: 0.88em;
    }
    .thinking {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .thinking .dots {
      display: inline-flex;
      gap: 4px;
    }
    .thinking .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease infinite;
    }
    .thinking .dots span:nth-child(2) { animation-delay: 0.15s; }
    .thinking .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.35; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }
    .composer-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.75rem 1rem 1rem;
      background: linear-gradient(transparent, var(--bg) 30%);
      border-top: 1px solid var(--border);
    }
    .composer {
      max-width: 52rem;
      margin: 0 auto;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      min-height: 48px;
      max-height: 160px;
      resize: vertical;
      padding: 0.65rem 0.9rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    #input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 158, 255, 0.2);
    }
    #send {
      padding: 0.65rem 1.1rem;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #061018;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #send:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Chat</h1>
    <div>
      <label for="mode">模式</label>
      <select id="mode" title="API 端點">
        <option value="/v1/chat/agent">Agent（可搜尋）</option>
        <option value="/v1/chat/completions">一般對話</option>
      </select>
    </div>
    <div>
      <label for="model">模型</label>
      <select id="model">
        <option value="gpt-5" selected>gpt-5</option>
      </select>
    </div>
  </header>
  <div id="messages" aria-live="polite"></div>
  <div class="composer-wrap">
    <div class="composer">
      <textarea id="input" rows="2" placeholder="輸入訊息…（Enter 送出，Shift+Enter 換行）"></textarea>
      <button type="button" id="send">送出</button>
    </div>
    <p class="hint">回覆支援 Markdown；由本機 API 轉發至 AI Builder。</p>
  </div>
  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const modeEl = document.getElementById("mode");
    const modelEl = document.getElementById("model");

    const history = [];

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderMarkdown(md) {
      if (!md || typeof md !== "string") return "<p></p>";
      const raw =
        typeof marked !== "undefined" && marked.parse
          ? marked.parse(md, { async: false })
          : escapeHtml(md);
      if (typeof DOMPurify !== "undefined") {
        return DOMPurify.sanitize(raw, { USE_PROFILES: { html: true } });
      }
      return "<pre style='white-space:pre-wrap;margin:0'>" + escapeHtml(md) + "</pre>";
    }

    function extractAssistantText(data) {
      const msg = data?.choices?.[0]?.message;
      if (!msg) return JSON.stringify(data, null, 2);
      const c = msg.content;
      if (typeof c === "string") return c;
      if (Array.isArray(c)) {
        return c.map((p) => (p && p.text) || "").join("") || "(無文字內容)";
      }
      return "(無文字內容)";
    }

    function appendUser(text) {
      const wrap = document.createElement("div");
      wrap.className = "msg user";
      wrap.innerHTML =
        '<span class="role">You</span><div class="bubble">' + escapeHtml(text) + "</div>";
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendAssistant(html) {
      const wrap = document.createElement("div");
      wrap.className = "msg assistant";
      wrap.innerHTML = '<span class="role">Assistant</span><div class="bubble">' + html + "</div>";
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendError(text) {
      const wrap = document.createElement("div");
      wrap.className = "msg error";
      wrap.innerHTML =
        '<span class="role">Error</span><div class="bubble"><pre style="white-space:pre-wrap;margin:0">' +
        escapeHtml(text) +
        "</pre></div>";
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showThinking() {
      const row = document.createElement("div");
      row.className = "thinking";
      row.id = "thinking-row";
      row.innerHTML =
        '<span>正在思考</span><span class="dots" aria-hidden="true"><span></span><span></span><span></span></span>';
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideThinking() {
      document.getElementById("thinking-row")?.remove();
    }

    let busy = false;

    async function submit() {
      const text = inputEl.value.trim();
      if (!text || busy) return;
      busy = true;
      sendBtn.disabled = true;
      inputEl.value = "";

      history.push({ role: "user", content: text });
      appendUser(text);
      showThinking();

      const endpoint = modeEl.value;
      const body = { messages: history.map((m) => ({ role: m.role, content: m.content })), model: modelEl.value };

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        hideThinking();
        if (!res.ok) {
          const errText =
            typeof data?.detail === "string"
              ? data.detail
              : JSON.stringify(data, null, 2);
          appendError(errText || res.statusText);
          history.pop();
          return;
        }
        const reply = extractAssistantText(data);
        history.push({ role: "assistant", content: reply });
        appendAssistant(renderMarkdown(reply));
      } catch (e) {
        hideThinking();
        appendError(String(e));
        history.pop();
      } finally {
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", submit);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });
  </script>
</body>
</html>
